name: LegoStopMotionSuite
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0
packages:
  StopMotionShared:
    path: ../Shared
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 5.10
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
targets:
  CaptureApp:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    sources:
      - path: ../iOSCaptureApp
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Plists/CaptureApp-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.icrabtree.stopmotion.capture
        PRODUCT_NAME: CaptureApp
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: StopMotionShared
  EditorApp:
    type: application
    platform: macOS
    deploymentTarget: 14.0
    sources:
      - path: ../macOSEditorApp
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Plists/EditorApp-Info.plist
    entitlements:
      path: Entitlements/EditorApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.icrabtree.stopmotion.editor
        PRODUCT_NAME: EditorApp
    dependencies:
      - package: StopMotionShared
  EditorAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: 14.0
    sources:
      - path: ../Tests/macOSEditorAppTests
    dependencies:
      - target: EditorApp
      - package: StopMotionShared
schemes:
  CaptureApp:
    build:
      targets:
        CaptureApp: all
    run:
      config: Debug
  EditorApp:
    build:
      targets:
        EditorApp: all
        EditorAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: EditorAppTests
